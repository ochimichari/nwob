<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合奏指導プレイヤー 複数音源対応Web版</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 10px; background: #ECEFF1; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: calc(100vh - 20px); }
        h3 { margin: 0 0 10px 0; color: #1E88E5; text-align: center; font-size: 16px; border-bottom: 2px solid #2196F3; padding-bottom: 6px; }
        
        .selector-panel { margin-bottom: 10px; }
        select { width: 100%; padding: 10px; font-size: 14px; border-radius: 6px; border: 1px solid #B0BEC5; background: #FAFAFA; font-weight: bold; }

        .player-panel { background: #F5F5F5; padding: 8px; border-radius: 8px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
        audio { width: 100%; height: 36px; }
        .time-display { font-family: monospace; font-size: 13px; font-weight: bold; text-align: right; padding-right: 4px; color: #555; }

        .timeline-container { width: 100%; margin-bottom: 10px; height: 35px; }
        canvas { width: 100%; height: 100%; background: #E0E0E0; border-radius: 6px; cursor: pointer; display: block; }

        .editor-container { border: 1px solid #CFD8DC; border-radius: 8px; flex: 1; overflow-y: auto; background: white; -webkit-overflow-scrolling: touch; }
        .line { padding: 12px 10px; border-bottom: 1px solid #ECEFF1; font-size: 13px; line-height: 1.5; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .highlight { background: #E3F2FD !important; font-weight: bold; border-left: 5px solid #2196F3; padding-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3>🎵 合奏指導プレイヤー Mobile</h3>
    
    <div class="selector-panel">
        <select id="folder-selector" onchange="changeFolder(this.value)">
            <!-- 選択メニュー（実際のフォルダ名に合わせてここを増やせます） -->
            <option value="20260516_airs">2026/05/16 エアーズ</option>
            <option value="20260516_sakura">2026/05/16 さくらのうた</option>
            <option value="20260516_kten">2026/05/16 K点をこえて</option>
            <option value="20260516_suteki">2026/05/16 すてきな日々</option>
        </select>
    </div>
    
    <div class="player-panel">
        <audio id="audio" controls></audio>
        <div class="time-display" id="time-display">00:00 / 00:00</div>
    </div>

    <div class="timeline-container">
        <canvas id="timeline-canvas"></canvas>
    </div>

    <div class="editor-container" id="editor">
        <div style="color: gray; text-align: center; padding-top: 100px; font-size:13px;">データを読み込み中...</div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio');
    const canvas = document.getElementById('timeline-canvas');
    const ctx = canvas.getContext('2d');
    const editor = document.getElementById('editor');
    const timeDisplay = document.getElementById('time-display');
    const selector = document.getElementById('folder-selector');

    let totalDuration = 0;
    let colorData = {};
    let textTimestamps = [];

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        drawTimeline();
    }
    window.addEventListener('resize', resizeCanvas);

    function changeFolder(folderName) {
        audio.pause();
        editor.innerHTML = `<div style="color: gray; text-align: center; padding-top: 100px;">読み込み中...</div>`;
        
        colorData = {};
        textTimestamps = [];
        totalDuration = 0;

        // フォルダ名からファイル名を自動計算（例: 20260516_airs -> airs）
        let fileName = folderName;
        if (folderName.includes('_')) {
            const parts = folderName.split('_');
            fileName = parts[parts.length - 1];
        }
        
        audio.src = `data/${folderName}/${fileName}.mp3`;
        audio.load();

        Promise.all([
            fetch(`data/${folderName}/${fileName}.txt`).then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            }),
            fetch(`data/${folderName}/${fileName}_color.txt`).then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            })
        ]).then(([textRaw, colorRaw]) => {
            parseText(textRaw);
            parseColor(colorRaw);
            resizeCanvas();
        }).catch(err => {
            editor.innerHTML = `<div style="color:red; text-align:center; padding-top:50px; font-size:13px;">データが見つかりません。<br>data/${folderName}/${fileName}.txt などの配置を確認してください。</div>`;
        });
    }

    function parseText(raw) {
        editor.innerHTML = '';
        const lines = raw.split('\n');
        let idx = 0;
        
        lines.forEach((line) => {
            const trimmed = line.trim();
            if (!trimmed) return;
            
            const div = document.createElement('div');
            div.className = 'line';
            div.innerText = trimmed;
            div.id = `line-${idx}`;
            
            let seconds = -1;
            if (trimmed.startsWith('[') && trimmed.includes(']')) {
                try {
                    // 【バグ修正】安全に時間文字列を切り出して秒数に変換
                    const parts = trimmed.split(']');
                    const tStr = parts[0].replace('[', '');
                    const [m, s] = tStr.split(':').map(Number);
                    seconds = m * 60 + s;
                } catch(e) {}
            }
            textTimestamps.push(seconds);

            div.addEventListener('click', () => {
                if (seconds !== -1) {
                    audio.currentTime = seconds;
                    audio.play();
                }
            });
            editor.appendChild(div);
            idx++;
        });
    }

    function parseColor(raw) {
        const lines = raw.split('\n');
        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.includes(' ')) return;
            const parts = trimmed.split(' ');
            const tStr = parts[0];
            const status = parts[1];
            try {
                const [m, s] = tStr.replace('[', '').replace(']', '').split(':').map(Number);
                colorData[m * 60 + s] = status.trim();
            } catch(e) {}
        });
    }

    audio.addEventListener('loadedmetadata', () => {
        totalDuration = Math.floor(audio.duration);
        updateTimeLabel();
        resizeCanvas();
    });

    audio.addEventListener('timeupdate', () => {
        const currentSeconds = Math.floor(audio.currentTime);
        updateTimeLabel();
        drawTimeline(currentSeconds);
        syncEditorScroll(currentSeconds);
    });

    function drawTimeline(currentSec = 0) {
        if (!totalDuration) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const secWidth = canvas.width / totalDuration;
        
        for (let s = 0; s < totalDuration; s++) {
            const x0 = s * secWidth;
            const status = colorData[s] || "SILENT";
            ctx.fillStyle = status === "SPEECH" ? "#EF5350" : status === "MUSIC" ? "#42A5F5" : "#B0BEC5";
            ctx.fillRect(x0, 0, secWidth + 0.6, canvas.height);
        }
        const indX = (currentSec / totalDuration) * canvas.width;
        ctx.fillStyle = "black";
        ctx.fillRect(indX - 1, 0, 3, canvas.height);
    }

    canvas.addEventListener('click', (e) => {
        if (!totalDuration) return;
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const targetSec = Math.floor((clickX / canvas.width) * totalDuration);
        audio.currentTime = targetSec;
    });

    function syncEditorScroll(currentSec) {
        let targetIdx = -1;
        for (let i = 0; i < textTimestamps.length; i++) {
            if (textTimestamps[i] !== -1 && textTimestamps[i] <= currentSec) {
                targetIdx = i;
            } else { break; }
        }
        
        document.querySelectorAll('.line').forEach(el => el.classList.remove('highlight'));
        if (targetIdx !== -1) {
            const activeLine = document.getElementById(`line-${targetIdx}`);
            if (activeLine) {
                activeLine.classList.add('highlight');
                editor.scrollTo({
                    top: activeLine.offsetTop - editor.offsetTop - 60,
                    behavior: 'smooth'
                });
            }
        }
    }

    function updateTimeLabel() {
        const curM = String(Math.floor(audio.currentTime / 60)).padStart(2, '0');
        const curS = String(Math.floor(audio.currentTime % 60)).padStart(2, '0');
        const totM = String(Math.floor(totalDuration / 60)).padStart(2, '0');
        const totS = String(Math.floor(totalDuration % 60)).padStart(2, '0');
        timeDisplay.innerText = `${curM}:${curS} / ${totM}:${totS}`;
    }

    window.onload = () => { changeFolder(selector.value); };
</script>

</body>
</html>
